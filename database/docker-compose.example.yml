#!/usr/bin/env bash
# Docker Compose configuration for both Cassandra and ScyllaDB

version: '3.8'

services:
  # Cassandra Service
  cassandra:
    build:
      context: ./cassandra
      args:
        CASSANDRA_VERSION: "4.1.3"
    container_name: cassandra
    hostname: cassandra
    ports:
      - "7000:7000"
      - "7001:7001"
      - "7199:7199"
      - "9042:9042"
      - "9160:9160"
    environment:
      - CASSANDRA_CLUSTER_NAME=Test Cluster
      - CASSANDRA_SEEDS=cassandra
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=SimpleSnitch
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=256M
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./cassandra/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - database-network
    healthcheck:
      test: ["CMD", "nodetool", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ScyllaDB Service
  scylladb:
    build:
      context: ./scylladb
      args:
        SCYLLADB_VERSION: "5.2.5"
    container_name: scylladb
    hostname: scylladb
    ports:
      - "7010:7000"
      - "7011:7001"
      - "7199:7199"
      - "9043:9042"
      - "9161:9160"
      - "10000:10000"
    environment:
      - SCYLLA_CLUSTER_NAME=Test Cluster
      - SCYLLA_SEEDS=scylladb
      - SCYLLA_DATACENTER=datacenter1
      - SCYLLA_RACK=rack1
      - SCYLLA_DEVELOPER_MODE=true
    volumes:
      - scylladb_data:/var/lib/scylla
      - ./scylladb/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - database-network
    healthcheck:
      test: ["CMD", "nodetool", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  cassandra_data:
    driver: local
  scylladb_data:
    driver: local

networks:
  database-network:
    driver: bridge
